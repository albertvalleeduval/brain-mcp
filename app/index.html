<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>my²brain</title>
    <meta name="theme-color" content="#000000" />
    <!-- Theme BEFORE first paint (no flash): same solar formula as
         app/src/theme.ts. auto = dark from sunset to sunrise.
         EDIT ME: the lat/lon below must match the ones in theme.ts. -->
    <script>
      (function () {
        var t = "dark";
        try {
          var m = localStorage.getItem("theme-mode");
          if (m === "light" || m === "dark") t = m;
          else {
            var now = new Date();
            var s = Date.UTC(now.getUTCFullYear(), 0, 0);
            var doy = (Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()) - s) / 864e5;
            var g = ((2 * Math.PI) / 365) * (doy - 0.5);
            var eq = 229.18 * (0.000075 + 0.001868 * Math.cos(g) - 0.032077 * Math.sin(g) - 0.014615 * Math.cos(2 * g) - 0.040849 * Math.sin(2 * g));
            var de = 0.006918 - 0.399912 * Math.cos(g) + 0.070257 * Math.sin(g) - 0.006758 * Math.cos(2 * g) + 0.000907 * Math.sin(2 * g) - 0.002697 * Math.cos(3 * g) + 0.00148 * Math.sin(3 * g);
            var rad = Math.PI / 180, lat = 48.8566, lon = 2.3522;
            var cH = Math.cos(90.833 * rad) / (Math.cos(lat * rad) * Math.cos(de)) - Math.tan(lat * rad) * Math.tan(de);
            var mins = now.getUTCHours() * 60 + now.getUTCMinutes();
            if (cH >= -1 && cH <= 1) {
              var ha = Math.acos(cH) / rad;
              t = mins < 720 - 4 * (lon + ha) - eq || mins >= 720 - 4 * (lon - ha) - eq ? "dark" : "light";
            } else t = mins < 420 || mins >= 1140 ? "dark" : "light";
          }
        } catch (e) {}
        document.documentElement.dataset.theme = t;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute("content", t === "dark" ? "#000000" : "#ffffff");
      })();
    </script>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
